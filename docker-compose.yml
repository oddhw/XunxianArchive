services:
  app:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      SYNC_INTERVAL_HOURS: 6
    volumes:
      - ./data:/app/data
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
