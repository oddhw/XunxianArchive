name: Publish version 1.0

on:
  push:
    branches:
      - codex/v1-release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\XunxianDpkViewer.csproj

      - name: Build
        run: dotnet build .\XunxianDpkViewer.csproj -c Release -p:Platform=x64 --no-restore

      - name: Publish single-file application
        run: dotnet publish .\XunxianDpkViewer.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -o .\publish --no-restore

      - name: Create version 1.0 release, verify it, then remove old releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Join-Path $PWD "publish\XunxianDpkViewer.exe"
          if (-not (Test-Path $asset)) { throw "Published EXE was not created." }
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash
          $notes = @"
          # 寻仙 DPK 资源浏览器 1.0

          - 自动读取全部 DPK，并按真实目录浏览图像、声音、模型、字体及配置资源
          - 支持 PMF、CCT、CMF、DDS 贴图链、组合模型与 OBJ 导出
          - 默认开启新手说明，可直观了解常见配置和地图数据用途
          - 顶部新增设置，可查看和更换客户端资源路径
          - 新增关于页面
          - 作者：黑风岭-梵心似火

          SHA-256：$hash
          "@
          Set-Content -LiteralPath .\release-notes.md -Value $notes -Encoding utf8

          gh release view v1.0 --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete v1.0 --repo "${{ github.repository }}" --cleanup-tag --yes
          }

          gh release create v1.0 "$asset#XunxianDpkViewer.exe" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "寻仙 DPK 资源浏览器 1.0" `
            --notes-file .\release-notes.md
          if ($LASTEXITCODE -ne 0) { throw "Failed to create v1.0 release." }

          $release = gh release view v1.0 --repo "${{ github.repository }}" --json assets,url | ConvertFrom-Json
          if ($release.assets.Count -ne 1 -or $release.assets[0].name -ne "XunxianDpkViewer.exe") {
            throw "v1.0 release asset verification failed. Old releases were kept."
          }
          Write-Host "Verified v1.0: $($release.url)"

          foreach ($oldTag in @("v0.1.0", "v0.2.0", "v0.3.0", "v0.4.0")) {
            gh release delete $oldTag --repo "${{ github.repository }}" --cleanup-tag --yes
            if ($LASTEXITCODE -ne 0) { Write-Warning "Could not delete $oldTag; continuing." }
          }
