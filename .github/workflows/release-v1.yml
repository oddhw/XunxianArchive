name: Publish latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\XunxianDpkViewer.csproj

      - name: Build
        run: dotnet build .\XunxianDpkViewer.csproj -c Release -p:Platform=x64 --no-restore

      - name: Publish single-file application
        run: dotnet publish .\XunxianDpkViewer.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -o .\publish --no-restore

      - name: Create version 1.1 release, verify it, then remove old releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Join-Path $PWD "publish\XunxianDpkViewer.exe"
          if (-not (Test-Path $asset)) { throw "Published EXE was not created." }
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash
          $notes = @"
          # 寻仙 DPK 资源浏览器 1.1

          - 修复 zj_tuzinv_042、zj_waiguonan_025 等角色组合模型误组合、预览失败和加载卡顿问题
          - 修复小尺度 PMF 模型被错误判定为退化三角面，导致实体和贴图模式只显示碎片的问题
          - 组合模型加载时显示加载进度，并跳过异常部件而不是让整组预览失败
          - 优先使用模型自身目录的贴图材质，改善 tuzinv 模型贴图匹配
          - 作者：黑风岭-梵心似火

          SHA-256：$hash
          "@
          Set-Content -LiteralPath .\release-notes.md -Value $notes -Encoding utf8

          $existingReleaseJson = gh release view v1.1 --repo "${{ github.repository }}" --json assets,url 2>$null
          if ($LASTEXITCODE -eq 0) {
            $release = $existingReleaseJson | ConvertFrom-Json
            Write-Host "v1.1 already exists: $($release.url)"
          } else {
            gh release create v1.1 "$asset#XunxianDpkViewer.exe" `
              --repo "${{ github.repository }}" `
              --target "${{ github.sha }}" `
              --title "寻仙 DPK 资源浏览器 1.1" `
              --notes-file .\release-notes.md
            if ($LASTEXITCODE -ne 0) { throw "Failed to create v1.1 release." }

            $release = gh release view v1.1 --repo "${{ github.repository }}" --json assets,url | ConvertFrom-Json
          }

          if ($release.assets.Count -ne 1 -or $release.assets[0].name -ne "XunxianDpkViewer.exe") {
            throw "v1.1 release asset verification failed. Old releases were kept."
          }
          Write-Host "Verified v1.1: $($release.url)"
